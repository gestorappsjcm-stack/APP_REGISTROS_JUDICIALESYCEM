<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Atenciones Poder Judicial y CEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a5276 0%, #2e86ab 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #1a5276;
            padding: 3px;
            background: white;
        }
        .login-box h1 { color: #1a5276; font-size: 20px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 30px; }
        .campo { margin-bottom: 18px; text-align: left; }
        .campo label { display: block; margin-bottom: 6px; color: #333; font-size: 13px; font-weight: 600; }
        .campo input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px;
            font-size: 14px; transition: border-color 0.3s;
        }
        .campo input:focus { outline: none; border-color: #1a5276; }
        button {
            width: 100%; padding: 14px; background: #1a5276; color: white; border: none;
            border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 10px; transition: background 0.3s;
        }
        button:hover { background: #154360; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            color: #c0392b; font-size: 13px; margin-top: 15px; padding: 10px;
            background: #fdeaea; border-radius: 5px; display: none;
        }
        .footer-text { color: #888; font-size: 11px; margin-top: 25px; line-height: 1.5; }
        @media (max-width: 480px) {
            .login-box { width: 90%; padding: 25px; margin: 20px; }
            .login-box h1 { font-size: 18px; }
            .logo-container { gap: 12px; }
            .logo { width: 55px; height: 55px; }
            .footer-text { font-size: 10px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/suladmental.png') }}" alt="Logo SULAD Mental" class="logo">
            <img src="{{ url_for('static', filename='img/image.png') }}" alt="Logo" class="logo">
        </div>
        <h1>Atenciones Poder Judicial y CEM</h1>
        <p class="subtitle">Sistema de Registro de Pacientes</p>

        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <div class="campo">
                <label>Usuario</label>
                <input type="text" id="usuario" placeholder="Ingrese su usuario" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="contraseña" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" id="btnLogin">Ingresar</button>
        </form>

        <p class="error" id="errorMsg"></p>

        <p class="footer-text">
            ATENCIONES PODER JUDICIAL Y CEM<br>
            HERRAMIENTA DE APOYO<br>
            UNIDAD DE SEGUROS
        </p>
    </div>

    <script>
        async function login() {
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            errorMsg.style.display = 'none';

            const usuario = document.getElementById('usuario').value.trim().toLowerCase();
            const contraseña = document.getElementById('contraseña').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, contraseña })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Error al iniciar sesión');
                }

                if (result.success) {
                    window.location.href = '/dashboard';
                } else {
                    throw new Error(result.error || 'Credenciales incorrectas');
                }

            } catch (e) {
                errorMsg.textContent = e.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        }
    </script>
</body>
</html>
